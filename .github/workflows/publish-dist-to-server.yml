name: Publish Dist To Server Repo

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  publish-dist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout web repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Checkout server repo
        uses: actions/checkout@v4
        with:
          repository: schurch/ferry-services-server-v2
          ref: master
          token: ${{ secrets.SERVER_REPO_TOKEN }}
          path: server-repo

      - name: Sync dist to server public
        run: |
          rm -rf server-repo/public/*
          cp -a dist/. server-repo/public/

      - name: Commit and push if changed
        working-directory: server-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public

          if git diff --cached --quiet; then
            echo "No changes in public/; skipping commit."
            exit 0
          fi

          git commit -m "Update web dist from schurch/ferry-services-web@${GITHUB_SHA}"
          git push origin master
